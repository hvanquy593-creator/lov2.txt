<style>

body{

background:#020617;color:#22c55e;overflow:hidden;
}
body::before{
content:"";position:absolute;width:100%;height:100%;
background:repeating-linear-gradient(
to bottom,rgba(0,255,0,0.05) 0px,rgba(0,255,0,0.05) 1px,transparent 1px,transparent 3px

animation:scan 4s linear infinite;
}
@keyframes scan{0%{transform:translateY(0);}100%{transform:translateY(100%);}}

.container{
background:rgba(0,0,0,0.85);border:1px solid #22c55e;
padding:25px;width:320px;border-radius:10px;
box-shadow:0 0 20px #22c55e;text-align:center;
}

h2{margin-bottom:15px;text-shadow:0 0 10px #22c55e;}

input{
width:100%;padding:12px;background:black;border:1px solid #22c55e;
color:#22c55e;border-radius:6px;margin-bottom:15px;outline:none;
}

button{
width:100%;padding:10px;background:black;border:1px solid #22c55e;
color:#22c55e;cursor:pointer;
}
button:hover{background:#22c55e;color:black;}

.switch{position:relative;display:inline-block;width:70px;height:36px;margin-top:20px;}
.switch input{display:none;}
.slider{
position:absolute;background:#111;border:1px solid #22c55e;
top:0;left:0;right:0;bottom:0;border-radius:50px;
}
.slider:before{
content:"";position:absolute;height:28px;width:28px;
left:4px;bottom:4px;background:#22c55e;border-radius:50%;transition:.3s;
}
input:checked + .slider:before{transform:translateX(34px);}

.log{margin-top:15px;height:100px;overflow:auto;font-size:12px;text-align:left;border:1px solid #22c55e;padding:10px;background:black;}
.bar-wrap{margin-top:10px;border:1px solid #22c55e;height:8px;}
.bar{height:100%;width:0%;background:#22c55e;}
.info,.admin{margin-top:10px;font-size:12px;text-align:left;border:1px solid #22c55e;padding:10px;background:black;}

#toggleArea{display:none;}
</style>
</head>

};

let systemRunning=false;
let systemLoop;

function log(msg){
let time=new Date().toLocaleTimeString();
let box=document.getElementById("log");
box.innerHTML += "<br>["+time+"] > "+msg;
box.scrollTop=box.scrollHeight;
}

function randomIP(){
return Math.floor(Math.random()*255)+"."+
Math.floor(Math.random()*255)+"."+
Math.floor(Math.random()*255)+"."+
Math.floor(Math.random()*255);
}

function loadFakeInfo(){
document.getElementById("info").innerHTML =
"> IP: "+randomIP()+"<br>> STATUS: PROTECTED";
}

/* 🔥 DECODE PROFILE */
function decodeProfile(){
try{
let xml = atob(config.profileData);
log("[PROFILE] decoding...");
log("[PROFILE] size: "+xml.length+" bytes");

setTimeout(()=>{
log("[PROFILE] XML loaded ✔");
log("[MODULE] AimAssist ✔");
log("[MODULE] PerformanceBoost ✔");
log("[MODULE] NetworkOptimizer ✔");
log("[MODULE] InputAccelerator ✔");
},500);

}catch(e){
log("[PROFILE] decode failed ❌");
}
}

function runSystem(){
systemLoop=setInterval(()=>{
if(!systemRunning) return;

let states=["idle","searching","tracking","locked"];
let state=states[Math.floor(Math.random()*states.length)];

log("[STATE] "+state.toUpperCase());
log("[FPS] "+config.system.fps);

if(state==="locked"){
log("[AIMLOCK] locked 🎯");
}

},1200);
}

function verifyKey(){
let key=document.getElementById("key").value.trim();
if(validKeys.includes(key)){
document.getElementById("loginArea").style.display="none";
document.getElementById("toggleArea").style.display="block";
loadFakeInfo();
}else{
alert("Key sai ❌");
}
}

function toggle(el){
let status=document.getElementById("status");
let bar=document.getElementById("bar");
let percent=document.getElementById("percent");

if(el.checked){
status.innerText="STATUS: LOADING...";
let i=0;

let run=setInterval(()=>{
i++;
bar.style.width=i+"%";
percent.innerText=i+"%";

if(i>=100){
clearInterval(run);

status.innerText="STATUS: ONLINE";
systemRunning=true;

runSystem();
decodeProfile(); // 🔥 chạy profile

log("system running 🚀");
}
},20);

}else{
status.innerText="STATUS: OFFLINE";
bar.style.width="0%";
percent.innerText="0%";
systemRunning=false;
clearInterval(systemLoop);
log("system stopped ❌");
}
}

</script>
